<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Field Log" />
<title>Field Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Lora:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#F6F0E4;
    --surface:#FFFFFF;
    --ink:#6B705C;
    --ink-muted:#B7B7A4;
    --line:#B7B7A4;
    --water:#A5A58D;
    --steps:#CB997E;
    --workout:#6B705C;
    --routine:#DDBEA9;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Lora', serif; }
  body { padding-bottom: 48px; min-height: 100vh; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .display { font-family:'Playfair Display', serif; font-style: italic; }
  .mono { font-family:'IBM Plex Mono', monospace; }
  .px4 { padding-left:16px; padding-right:16px; }
  .header { padding: 24px 20px 12px; display:flex; align-items:flex-start; justify-content:space-between; }
  .eyebrow { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); font-family:'Lora', serif; font-weight:500; }
  .title { font-size: 28px; font-weight:600; line-height:1.15; margin-top:2px; }
  .iconbtn { width:38px; height:38px; border-radius:999px; border:1px solid var(--line); background:var(--surface); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .iconbtn:active { transform: scale(0.95); }
  .headerBtns { display:flex; gap:8px; }
  .tabs { display:flex; gap:8px; padding: 0 16px 12px; }
  .tab { flex:1; text-align:center; font-size:14px; font-weight:500; padding:7px 0; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--ink); font-family:'Lora', serif; }
  .tab.active { background:var(--ink); color:#fff; border-color:var(--ink); }
  .stack { padding: 0 16px; display:flex; flex-direction:column; gap:12px; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .row-left { display:flex; align-items:center; gap:8px; }
  .sectionTitle { font-size:18px; font-weight:600; }
  .muted { color: var(--ink-muted); }
  .small { font-size:13px; }
  .xs { font-size:12px; }
  .track { height:10px; border-radius:999px; overflow:hidden; margin-bottom:12px; }
  .fill { height:100%; border-radius:999px; transition: width .25s ease; }
  .chipRow { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { font-size:14px; font-weight:500; border-radius:10px; padding:7px 12px; border:none; font-family:'Lora', serif; }
  .chip:active { transform: scale(0.95); }
  input, select, textarea, button { font-family:'Lora', serif; }
  input[type=text], input[type=number], textarea {
    border:1px solid var(--line); border-radius:10px; padding:8px 12px; font-size:14px; background:#fff; color:var(--ink); width:100%;
  }
  select { border:1px solid var(--line); border-radius:10px; padding:7px 8px; font-size:13px; background:transparent; color:var(--ink); }
  .btn { border:none; border-radius:10px; padding:8px 14px; color:#fff; font-size:14px; font-weight:500; }
  .btn:active { transform: scale(0.95); }
  .goalRow { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .goalRow input { width:90px; flex:none; }
  .toggleBtn { width:100%; border-radius:10px; padding:11px 0; font-size:14px; font-weight:500; border:1.5px solid var(--steps); background:#fff; color:var(--steps); display:flex; align-items:center; justify-content:center; gap:6px; }
  .toggleBtn.done { background:var(--steps); color:#fff; }
  .toggleBtn:active { transform: scale(0.97); }
  .dotsRow { display:flex; gap:6px; margin-bottom:12px; }
  .dotsRow > div { flex:1; height:10px; border-radius:999px; }
  .inline2 { display:flex; gap:8px; margin-bottom:10px; }
  .inline2 input[type=text] { flex:1; }
  ul.tasklist, ul.wlist { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px; }
  .taskrow, .wrow { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  .checkbox { width:20px; height:20px; border-radius:6px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; flex-shrink:0; background:transparent; }
  .checkbox.checked { background:var(--ink); border-color:var(--ink); }
  .checkbox.checked.routine { background:var(--routine); border-color:var(--routine); }
  .flex1 { flex:1; }
  .iconGhost { background:none; border:none; padding:4px; display:flex; align-items:center; }
  .strike { text-decoration: line-through; color: var(--ink-muted); }
  .emptyMsg { text-align:center; color:var(--ink-muted); font-size:14px; padding:12px 0; }
  .footerNote { text-align:center; color:var(--ink-muted); font-size:12px; padding: 20px 16px 0; }
  .recurPicker { display:flex; align-items:center; gap:6px; margin-bottom:12px; }
  .bigNum { font-family:'IBM Plex Mono', monospace; font-size:22px; }
  .bigNumLabel { font-family:'Lora', serif; color:var(--ink-muted); font-size:14px; }
  svg { display:block; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ---------- date helpers ---------- */
function todayKey(d){ d = d || new Date(); return d.toISOString().slice(0,10); }
function startOfWeek(d){ d = new Date(d || new Date()); var day = d.getDay(); var diff = (day===0?-6:1)-day; d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d; }
function startOfMonth(d){ d = new Date(d || new Date()); d.setDate(1); d.setHours(0,0,0,0); return d; }
function uid(){ return Math.random().toString(36).slice(2,9); }
function weekdayShort(iso){ return new Date(iso).toLocaleDateString(undefined,{weekday:'short'}); }
function periodKeyFor(recurrence, d){
  d = d || new Date();
  switch(recurrence){
    case 'daily': return todayKey(d);
    case 'weekly': return todayKey(startOfWeek(d));
    case 'monthly': return d.getFullYear()+'-'+(d.getMonth()+1);
    case 'quarterly': return d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1);
    case 'yearly': return ''+d.getFullYear();
    default: return null;
  }
}
function hexToRgba(hex, a){
  hex = hex.replace('#','');
  var r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
  return 'rgba('+r+', '+g+', '+b+', '+a+')';
}
var COLORS = { water:'#A5A58D', steps:'#CB997E', workout:'#6B705C', routine:'#DDBEA9', ink:'#6B705C', inkMuted:'#B7B7A4', line:'#B7B7A4' };

var RECURRENCE_OPTIONS = [
  ['none','No repeat'], ['daily','Daily'], ['weekly','Weekly'],
  ['monthly','Monthly'], ['quarterly','Quarterly'], ['yearly','Yearly']
];

var DEFAULT_DATA = {
  lastDate: todayKey(),
  water: { goal: 80, current: 0 },
  steps: { goal: 12000, hitToday: false },
  workout: { goal: 4, log: [] },
  tasks: [],
  routine: {
    items: [
      { id:'r1', label:'Read book pages' },
      { id:'r2', label:'Use red light therapy mask' }
    ],
    completedToday: []
  },
  history: []
};

function snapshotDay(d, dateKey){
  return {
    date: dateKey,
    waterOz: d.water.current,
    waterGoal: d.water.goal,
    stepsHit: !!d.steps.hitToday,
    stepsGoal: d.steps.goal,
    routineCompleted: d.routine.completedToday.length,
    routineTotal: d.routine.items.length
  };
}

/* ---------- load + migrate + rollover ---------- */
function loadState(){
  var raw = null;
  try { raw = localStorage.getItem('fieldlog-data'); } catch(e) {}
  var data = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  if (!data.routine) data.routine = JSON.parse(JSON.stringify(DEFAULT_DATA.routine));
  if (!data.history) data.history = [];
  if (!data.steps || data.steps.hitToday === undefined) {
    data.steps = { goal: (data.steps && data.steps.goal) || 12000, hitToday: false };
  }
  if (data.tasks) {
    data.tasks = data.tasks.map(function(t){
      if (t.recurrence) return t;
      var recurrence = t.recurring ? 'daily' : 'none';
      return Object.assign({}, t, { recurrence: recurrence, lastResetPeriodKey: recurrence !== 'none' ? periodKeyFor(recurrence) : null });
    });
  } else {
    data.tasks = [];
  }

  var today = todayKey();
  if (data.lastDate !== today) {
    var snap = snapshotDay(data, data.lastDate);
    data.history = data.history.concat([snap]).slice(-90);
    data.lastDate = today;
    data.water = Object.assign({}, data.water, { current: 0 });
    data.steps = Object.assign({}, data.steps, { hitToday: false });
    data.routine = Object.assign({}, data.routine, { completedToday: [] });
    data.tasks = data.tasks.map(function(t){
      if (!t.recurrence || t.recurrence === 'none') return t;
      var key = periodKeyFor(t.recurrence, new Date(today));
      if (t.lastResetPeriodKey !== key) return Object.assign({}, t, { done:false, lastResetPeriodKey:key });
      return t;
    });
  }
  return data;
}
function saveState(){ try { localStorage.setItem('fieldlog-data', JSON.stringify(state)); } catch(e) {} }

/* ---------- state ---------- */
var state = loadState();
saveState();
var currentTab = 'today';
var editingGoals = false;
var showBackup = false;
var restoreMsg = '';

/* ---------- mutations ---------- */
function addWater(amt){ state.water.current = Math.max(0, state.water.current + amt); saveState(); render(); }
function toggleStepsHit(){ state.steps.hitToday = !state.steps.hitToday; saveState(); render(); }
function logWorkout(note){
  note = (note || '').trim() || 'Workout';
  state.workout.log.unshift({ id: uid(), date: state.lastDate, note: note });
  saveState(); render();
}
function deleteWorkout(id){ state.workout.log = state.workout.log.filter(function(w){return w.id!==id;}); saveState(); render(); }
function addTask(text, recurrence){
  text = (text||'').trim(); if(!text) return;
  state.tasks.unshift({ id: uid(), text: text, done:false, recurrence: recurrence,
    lastResetPeriodKey: recurrence!=='none' ? periodKeyFor(recurrence) : null });
  saveState(); render();
}
function toggleTask(id){ state.tasks = state.tasks.map(function(t){ return t.id===id ? Object.assign({},t,{done:!t.done}) : t; }); saveState(); render(); }
function deleteTask(id){ state.tasks = state.tasks.filter(function(t){return t.id!==id;}); saveState(); render(); }
function setTaskRecurrence(id, recurrence){
  state.tasks = state.tasks.map(function(t){
    return t.id===id ? Object.assign({},t,{recurrence:recurrence, lastResetPeriodKey: recurrence!=='none'?periodKeyFor(recurrence):null}) : t;
  });
  saveState(); render();
}
function addRoutineItem(label){
  label = (label||'').trim(); if(!label) return;
  state.routine.items.push({ id: uid(), label: label });
  saveState(); render();
}
function toggleRoutineItem(id){
  var i = state.routine.completedToday.indexOf(id);
  if (i>=0) state.routine.completedToday.splice(i,1); else state.routine.completedToday.push(id);
  saveState(); render();
}
function deleteRoutineItem(id){
  state.routine.items = state.routine.items.filter(function(x){return x.id!==id;});
  state.routine.completedToday = state.routine.completedToday.filter(function(x){return x!==id;});
  saveState(); render();
}
function setGoal(field, value){
  var n = parseInt(value,10); if(isNaN(n) || n<=0) return;
  state[field] = Object.assign({}, state[field], {goal:n}); saveState(); render();
}
function restoreBackup(text){
  try {
    var parsed = JSON.parse(text);
    if (!parsed || typeof parsed !== 'object') throw new Error('bad');
    state = parsed; saveState(); restoreMsg = 'Restored! Your data is back.';
  } catch(e) { restoreMsg = "That didn't look like a valid backup. Double-check you copied the whole thing."; }
  render();
}

/* ---------- aggregation ---------- */
function summarize(entries){
  var days = entries.length;
  var totalWater = entries.reduce(function(s,e){return s+e.waterOz;},0);
  var avgWater = days ? Math.round(totalWater/days) : 0;
  var waterMetDays = entries.filter(function(e){return e.waterOz >= e.waterGoal;}).length;
  var stepsHitDays = entries.filter(function(e){return e.stepsHit;}).length;
  var routineCompleted = entries.reduce(function(s,e){return s+e.routineCompleted;},0);
  var routineTotal = entries.reduce(function(s,e){return s+e.routineTotal;},0);
  return { days:days, avgWater:avgWater, waterMetDays:waterMetDays, stepsHitDays:stepsHitDays, routineCompleted:routineCompleted, routineTotal:routineTotal };
}

/* ---------- icons (inline svg, minimal) ---------- */
var ICONS = {
  droplet: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="M12 2.69s-5.5 6.16-5.5 10.06a5.5 5.5 0 0 0 11 0c0-3.9-5.5-10.06-5.5-10.06Z"/></svg>',
  footprints: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 9c.03-1.95 2-2.5 2-4.5a2.5 2.5 0 0 1 5 0c0 1.5-1 2-1 3.5"/><path d="M14 20v-2.38c0-2.12 1.03-3.12 1-4.62-.03-1.95-2-2.5-2-4.5a2.5 2.5 0 1 0-5 0c0 1.5 1 2 1 3.5"/></svg>',
  dumbbell: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>',
  moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
  settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><circle cx="6" cy="8" r="2"/><path d="M6 10v8M6 8V2M12 4v2"/><circle cx="12" cy="8" r="0"/></svg>',
  gear: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="M6 16h12M6 8h12M8 4v4M16 16v4"/></svg>',
  check: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>',
  trash: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/></svg>',
  backup: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{c}" stroke-width="2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14a8 3 0 0 0 16 0V5"/><path d="M4 12a8 3 0 0 0 16 0"/></svg>'
};
function icon(name, color){ return ICONS[name].replace(/{c}/g, color); }

/* ---------- render ---------- */
function render(){
  var allEntries = state.history.concat([snapshotDay(state, state.lastDate)]);
  var weekStart = startOfWeek();
  var monthStart = startOfMonth();
  var weekEntries = allEntries.filter(function(e){ return new Date(e.date) >= weekStart; });
  var monthEntries = allEntries.filter(function(e){ return new Date(e.date) >= monthStart; });
  var weekWorkouts = state.workout.log.filter(function(w){ return new Date(w.date) >= weekStart; });
  var monthWorkouts = state.workout.log.filter(function(w){ return new Date(w.date) >= monthStart; });
  var weekSummary = summarize(weekEntries);
  var monthSummary = summarize(monthEntries);

  var dateLabel = new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
  var headerTitle = currentTab==='today' ? dateLabel : (currentTab==='week' ? 'This Week' : 'This Month');

  var html = '';
  html += '<div class="header"><div><div class="eyebrow">Field Log</div><div class="title display">'+headerTitle+'</div></div>';
  if (currentTab==='today') {
    html += '<div class="headerBtns">';
    html += '<button class="iconbtn" data-action="toggle-backup">'+icon('backup', COLORS.inkMuted)+'</button>';
    html += '<button class="iconbtn" data-action="toggle-goals">'+icon('gear', COLORS.inkMuted)+'</button>';
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="tabs">';
  [['today','Today'],['week','Week'],['month','Month']].forEach(function(pair){
    html += '<button class="tab'+(currentTab===pair[0]?' active':'')+'" data-action="set-tab" data-tab="'+pair[0]+'">'+pair[1]+'</button>';
  });
  html += '</div>';

  if (showBackup && currentTab==='today') html += renderBackupPanel();
  if (currentTab==='today') html += renderToday();
  if (currentTab==='week') html += renderRollup(weekSummary, weekEntries, weekWorkouts, true);
  if (currentTab==='month') html += renderRollup(monthSummary, monthEntries, monthWorkouts, false);

  document.getElementById('app').innerHTML = html;
}

function renderBackupPanel(){
  var json = JSON.stringify(state);
  var msg = restoreMsg ? '<p class="xs muted" style="margin-top:8px;">'+restoreMsg+'</p>' : '';
  return ''+
  '<div class="px4" style="margin-bottom:12px;">'+
    '<div class="card">'+
      '<div class="row-left" style="margin-bottom:8px;">'+icon('backup', COLORS.ink)+'<span class="sectionTitle display">Backup &amp; Restore</span></div>'+
      '<p class="small muted" style="margin-top:0;">Copy this text somewhere safe to keep a backup of all your data, or use it to move your data to a new copy of this page.</p>'+
      '<p class="xs" style="font-weight:500; margin-bottom:4px;">Your data (tap, select all, copy)</p>'+
      '<textarea id="backupOutput" readonly style="height:88px; font-family:\'IBM Plex Mono\',monospace; font-size:11px; background:'+hexToRgba(COLORS.ink,0.04)+';">'+json+'</textarea>'+
      '<p class="xs" style="font-weight:500; margin:10px 0 4px;">Paste a backup here to restore it</p>'+
      '<textarea id="restoreInput" placeholder="Paste backup text here" style="height:88px; font-family:\'IBM Plex Mono\',monospace; font-size:11px;"></textarea>'+
      '<div style="margin-top:8px;"><button class="btn" style="background:'+COLORS.ink+';" data-action="restore-backup">Restore</button></div>'+
      msg+
    '</div>'+
  '</div>';
}

function renderToday(){
  var w = state.water, s = state.steps, wk = state.workout, rt = state.routine;
  var weekStart = startOfWeek();
  var weekWorkouts = wk.log.filter(function(x){ return new Date(x.date) >= weekStart; });
  var waterPct = Math.min(100, Math.round((w.current / w.goal) * 100));

  var html = '<div class="stack">';

  /* WATER */
  html += '<div class="card">';
  html += '<div class="row"><div class="row-left">'+icon('droplet',COLORS.water)+'<span class="sectionTitle display">Water</span></div>';
  html += '<div class="mono small">'+w.current+'<span class="muted"> / '+w.goal+' oz</span></div></div>';
  html += '<div class="track" style="background:'+hexToRgba(COLORS.water,0.18)+'"><div class="fill" style="width:'+waterPct+'%; background:'+COLORS.water+'"></div></div>';
  if (editingGoals) {
    html += '<div class="goalRow"><span class="xs muted">Daily goal (oz)</span><input type="number" value="'+w.goal+'" data-action="set-goal" data-field="water" /></div>';
  }
  html += '<div class="chipRow">';
  html += '<button class="chip" style="background:'+hexToRgba(COLORS.water,0.16)+'; color:'+COLORS.water+';" data-action="add-water" data-amt="8">+8 oz</button>';
  html += '<button class="chip" style="background:'+hexToRgba(COLORS.water,0.16)+'; color:'+COLORS.water+';" data-action="add-water" data-amt="16">+16 oz</button>';
  html += '<button class="chip" style="background:'+hexToRgba(COLORS.water,0.16)+'; color:'+COLORS.water+';" data-action="add-water" data-amt="24">+24 oz</button>';
  html += '<input type="number" id="customWater" placeholder="custom" style="width:80px;" />';
  html += '<button class="btn" style="background:'+COLORS.water+';" data-action="add-water-custom">Add</button>';
  html += '</div></div>';

  /* STEPS */
  html += '<div class="card">';
  html += '<div class="row"><div class="row-left">'+icon('footprints',COLORS.steps)+'<span class="sectionTitle display">Steps</span></div>';
  html += '<span class="mono small muted">Goal: '+s.goal.toLocaleString()+'</span></div>';
  if (editingGoals) {
    html += '<div class="goalRow"><span class="xs muted">Daily step goal</span><input type="number" value="'+s.goal+'" data-action="set-goal" data-field="steps" /></div>';
  }
  html += '<button class="toggleBtn'+(s.hitToday?' done':'')+'" data-action="toggle-steps">'+
    (s.hitToday ? icon('check','#fff') : '') +
    (s.hitToday ? ('Hit '+s.goal.toLocaleString()+' steps') : ('Mark '+s.goal.toLocaleString()+' steps done')) +
    '</button></div>';

  /* WORKOUTS */
  html += '<div class="card">';
  html += '<div class="row"><div class="row-left">'+icon('dumbbell',COLORS.workout)+'<span class="sectionTitle display">Workouts</span></div>';
  html += '<div class="mono small">'+weekWorkouts.length+'<span class="muted"> / '+wk.goal+' this week</span></div></div>';
  html += '<div class="dotsRow">';
  for (var i=0;i<wk.goal;i++){ html += '<div style="background:'+(i<weekWorkouts.length?COLORS.workout:hexToRgba(COLORS.workout,0.18))+'"></div>'; }
  html += '</div>';
  if (editingGoals) {
    html += '<div class="goalRow"><span class="xs muted">Weekly goal (workouts)</span><input type="number" value="'+wk.goal+'" data-action="set-goal" data-field="workout" /></div>';
  }
  html += '<div class="inline2"><input type="text" id="workoutNote" placeholder="What did you do? e.g. Ran 5k" />';
  html += '<button class="btn" style="background:'+COLORS.workout+';" data-action="log-workout">Log</button></div>';
  if (weekWorkouts.length) {
    html += '<ul class="wlist">';
    weekWorkouts.forEach(function(wo){
      html += '<li class="wrow"><span class="mono xs muted" style="width:36px;">'+weekdayShort(wo.date)+'</span><span class="small flex1">'+escapeHtml(wo.note)+'</span>'+
        '<button class="iconGhost" data-action="delete-workout" data-id="'+wo.id+'">'+icon('trash',COLORS.inkMuted)+'</button></li>';
    });
    html += '</ul>';
  }
  html += '</div>';

  /* ROUTINE */
  html += '<div class="card">';
  html += '<div class="row"><div class="row-left">'+icon('moon',COLORS.routine)+'<span class="sectionTitle display">Evening Routine</span></div><span class="xs muted">Resets nightly</span></div>';
  html += '<ul class="tasklist" style="margin-bottom:12px;">';
  rt.items.forEach(function(item){
    var done = rt.completedToday.indexOf(item.id) >= 0;
    html += '<li class="taskrow">'+
      '<button class="checkbox'+(done?' checked routine':'')+'" data-action="toggle-routine" data-id="'+item.id+'">'+(done?icon('check','#fff'):'')+'</button>'+
      '<span class="small flex1'+(done?' strike':'')+'">'+escapeHtml(item.label)+'</span>'+
      '<button class="iconGhost" data-action="delete-routine" data-id="'+item.id+'">'+icon('trash',COLORS.inkMuted)+'</button>'+
      '</li>';
  });
  html += '</ul>';
  html += '<div class="inline2"><input type="text" id="newRoutineText" placeholder="Add a nightly habit" />';
  html += '<button class="btn" style="background:'+COLORS.routine+';" data-action="add-routine">+</button></div>';
  html += '</div>';

  /* TASKS */
  html += '<div class="card">';
  html += '<div class="row"><span class="sectionTitle display">Tasks</span><span class="xs muted">Stays until cleared</span></div>';
  html += '<div class="inline2"><input type="text" id="newTaskText" placeholder="Add a task" />';
  html += '<button class="btn" style="background:'+COLORS.ink+';" data-action="add-task">+</button></div>';
  html += '<div class="recurPicker">'+icon('moon',COLORS.inkMuted)+'<select id="newTaskRecurrence">';
  RECURRENCE_OPTIONS.forEach(function(o){ html += '<option value="'+o[0]+'">'+o[1]+'</option>'; });
  html += '</select></div>';
  if (!state.tasks.length) {
    html += '<p class="emptyMsg">No tasks yet. Add one above.</p>';
  } else {
    html += '<ul class="tasklist">';
    state.tasks.forEach(function(t){
      html += '<li class="taskrow">'+
        '<button class="checkbox'+(t.done?' checked':'')+'" data-action="toggle-task" data-id="'+t.id+'">'+(t.done?icon('check','#fff'):'')+'</button>'+
        '<span class="small flex1'+(t.done?' strike':'')+'">'+escapeHtml(t.text)+'</span>'+
        '<select data-action="set-task-recurrence" data-id="'+t.id+'">';
      RECURRENCE_OPTIONS.forEach(function(o){ html += '<option value="'+o[0]+'"'+(t.recurrence===o[0]?' selected':'')+'>'+o[1]+'</option>'; });
      html += '</select>'+
        '<button class="iconGhost" data-action="delete-task" data-id="'+t.id+'">'+icon('trash',COLORS.inkMuted)+'</button>'+
        '</li>';
    });
    html += '</ul>';
  }
  html += '</div>';

  html += '</div>'; // .stack
  html += '<p class="footerNote">Water, steps, and your evening routine reset each morning. Tasks stay until you clear them.</p>';
  return html;
}

function renderRollup(summary, entries, workouts, showDots){
  var routinePct = summary.routineTotal ? Math.round((summary.routineCompleted/summary.routineTotal)*100) : 0;
  var html = '<div class="stack">';

  html += '<div class="card">';
  html += '<div class="row-left" style="margin-bottom:10px;">'+icon('droplet',COLORS.water)+'<span class="sectionTitle display">Water</span></div>';
  html += '<div style="margin-bottom:4px;"><span class="bigNum">'+summary.waterMetDays+'</span><span class="bigNumLabel"> / '+summary.days+' days hit '+( (state.water.goal) )+'oz</span></div>';
  html += '<p class="small muted" style="margin:0 0 8px;">Averaging '+summary.avgWater+' oz/day</p>';
  if (showDots) html += dotRow(entries, null, 'waterOz', 'waterGoal', COLORS.water);
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="row-left" style="margin-bottom:10px;">'+icon('footprints',COLORS.steps)+'<span class="sectionTitle display">Steps</span></div>';
  html += '<div style="margin-bottom:8px;"><span class="bigNum">'+summary.stepsHitDays+'</span><span class="bigNumLabel"> / '+summary.days+' days hit '+state.steps.goal.toLocaleString()+'</span></div>';
  if (showDots) html += dotRow(entries, 'stepsHit', null, null, COLORS.steps);
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="row"><div class="row-left">'+icon('dumbbell',COLORS.workout)+'<span class="sectionTitle display">Workouts</span></div><div class="mono small">'+workouts.length+' logged</div></div>';
  if (!workouts.length) {
    html += '<p class="small muted">Nothing logged yet.</p>';
  } else {
    html += '<ul class="wlist" style="max-height:190px; overflow-y:auto;">';
    workouts.forEach(function(w){
      html += '<li class="wrow"><span class="mono xs muted" style="width:36px;">'+weekdayShort(w.date)+'</span><span class="small flex1">'+escapeHtml(w.note)+'</span></li>';
    });
    html += '</ul>';
  }
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="row-left" style="margin-bottom:10px;">'+icon('moon',COLORS.routine)+'<span class="sectionTitle display">Evening Routine</span></div>';
  html += '<div style="margin-bottom:8px;"><span class="bigNum">'+routinePct+'%</span><span class="bigNumLabel"> of habits completed</span></div>';
  html += '<div class="track" style="background:'+hexToRgba(COLORS.routine,0.18)+'"><div class="fill" style="width:'+routinePct+'%; background:'+COLORS.routine+'"></div></div>';
  html += '</div>';

  html += '</div>';
  return html;
}

function dotRow(entries, boolKey, metKey, goalKey, color){
  var start = startOfWeek();
  var html = '<div class="dotsRow" style="align-items:flex-start;">';
  for (var i=0;i<7;i++){
    var d = new Date(start); d.setDate(d.getDate()+i);
    var dateStr = todayKey(d);
    var entry = entries.filter(function(e){return e.date===dateStr;})[0];
    var state_ = 'empty';
    if (entry) {
      if (boolKey) state_ = entry[boolKey] ? 'met' : 'missed';
      else state_ = entry[metKey] >= entry[goalKey] ? 'met' : 'missed';
    }
    var bg = state_==='met' ? color : (state_==='missed' ? hexToRgba(color,0.25) : 'transparent');
    var border = state_==='empty' ? ('1px solid '+hexToRgba(color,0.3)) : 'none';
    html += '<div style="display:flex; flex-direction:column; align-items:center; gap:4px; flex:1;">'+
      '<div style="width:100%; height:22px; border-radius:6px; background:'+bg+'; border:'+border+';"></div>'+
      '<span class="mono xs muted">'+weekdayShort(dateStr).charAt(0)+'</span></div>';
  }
  html += '</div>';
  return html;
}

function escapeHtml(str){
  var d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

/* ---------- event delegation ---------- */
document.getElementById('app').addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.getAttribute('data-action');
  switch(action){
    case 'set-tab': currentTab = el.getAttribute('data-tab'); render(); break;
    case 'toggle-goals': editingGoals = !editingGoals; render(); break;
    case 'toggle-backup': showBackup = !showBackup; restoreMsg=''; render(); break;
    case 'add-water': addWater(parseInt(el.getAttribute('data-amt'),10)); break;
    case 'add-water-custom': {
      var inp = document.getElementById('customWater');
      var n = parseInt(inp.value,10);
      if (!isNaN(n) && n!==0) addWater(n); else render();
      break;
    }
    case 'toggle-steps': toggleStepsHit(); break;
    case 'log-workout': {
      var note = document.getElementById('workoutNote').value;
      logWorkout(note);
      break;
    }
    case 'delete-workout': deleteWorkout(el.getAttribute('data-id')); break;
    case 'add-task': {
      var text = document.getElementById('newTaskText').value;
      var rec = document.getElementById('newTaskRecurrence').value;
      addTask(text, rec);
      break;
    }
    case 'toggle-task': toggleTask(el.getAttribute('data-id')); break;
    case 'delete-task': deleteTask(el.getAttribute('data-id')); break;
    case 'add-routine': {
      var label = document.getElementById('newRoutineText').value;
      addRoutineItem(label);
      break;
    }
    case 'toggle-routine': toggleRoutineItem(el.getAttribute('data-id')); break;
    case 'delete-routine': deleteRoutineItem(el.getAttribute('data-id')); break;
    case 'restore-backup': {
      var t = document.getElementById('restoreInput').value;
      restoreBackup(t);
      break;
    }
  }
});

document.getElementById('app').addEventListener('change', function(e){
  var el = e.target;
  var action = el.getAttribute('data-action');
  if (action === 'set-goal') setGoal(el.getAttribute('data-field'), el.value);
  if (action === 'set-task-recurrence') setTaskRecurrence(el.getAttribute('data-id'), el.value);
});

document.getElementById('app').addEventListener('keydown', function(e){
  if (e.key !== 'Enter') return;
  if (e.target.id === 'customWater') { document.querySelector('[data-action="add-water-custom"]').click(); }
  if (e.target.id === 'workoutNote') { document.querySelector('[data-action="log-workout"]').click(); }
  if (e.target.id === 'newTaskText') { document.querySelector('[data-action="add-task"]').click(); }
  if (e.target.id === 'newRoutineText') { document.querySelector('[data-action="add-routine"]').click(); }
});

document.getElementById('app').addEventListener('focusin', function(e){
  if (e.target.id === 'backupOutput') e.target.select();
});

render();
</script>
